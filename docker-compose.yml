services:
  news-ticker:
    build: .
    container_name: news-ticker-display
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - PORT=3000
      - RSS_FETCH_TIMEOUT_MS=${RSS_FETCH_TIMEOUT_MS:-15000}
      - RSS_FETCH_MAX_REDIRECTS=${RSS_FETCH_MAX_REDIRECTS:-10}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
